name: CI

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout only-engine
        uses: actions/checkout@v4
        with:
          path: only-engine

      - name: Checkout cap4k
        uses: actions/checkout@v4
        with:
          repository: LDmoxeii/cap4k
          path: cap4k

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrappers executable
        run: chmod +x cap4k/gradlew only-engine/gradlew

      - name: Publish cap4k snapshots to Maven local
        working-directory: cap4k
        run: ./gradlew publishToMavenLocal

      - name: Check
        working-directory: only-engine
        run: ./gradlew check -PonlyEngine.useMavenLocalCap4k=true
