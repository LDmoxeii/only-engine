name: CI

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      CAP4K_REF: docs/issue-84-generator-boundary-spec

    steps:
      - name: Checkout only-engine
        run: |
          git init only-engine
          cd only-engine
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "${GITHUB_SHA}"
          git checkout --detach FETCH_HEAD

      - name: Checkout cap4k
        run: |
          git init cap4k
          cd cap4k
          git remote add origin "https://github.com/LDmoxeii/cap4k.git"
          git fetch --depth=1 origin "${CAP4K_REF}"
          git checkout --detach FETCH_HEAD

      - name: Set up JDK 17
        run: |
          echo "JAVA_HOME=${JAVA_HOME_17_X64}" >> "$GITHUB_ENV"
          echo "${JAVA_HOME_17_X64}/bin" >> "$GITHUB_PATH"
          "${JAVA_HOME_17_X64}/bin/java" -version

      - name: Make Gradle wrappers executable
        run: chmod +x cap4k/gradlew only-engine/gradlew

      - name: Check
        working-directory: only-engine
        run: ./gradlew check -PonlyEngine.cap4kCompositePath="$GITHUB_WORKSPACE/cap4k"
